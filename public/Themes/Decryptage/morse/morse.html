<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercice Morse - Décryptage</title>
    <link rel="stylesheet" href="./morse.css" />
    <link rel="stylesheet" href="/css/global.css" />
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
  </head>
  <body>
    <nav class="navbar">
      <div class="navbar-left">
          <a href="/" class="project-title">Challenge 48h</a>
      </div>
      <div class="navbar-right">
          <a href="/" class="nav-link">Thèmes</a>
          <a href="/themes/decryptage" class="nav-link">Décryptage</a>
      </div>
    </nav>
    <main class="container">
      <h1>Exercice de Décryptage Morse</h1>
      <p class="subtitle">
        Décode les messages morse. Tu avances uniquement quand tu fais
        <strong>Win</strong>.
      </p>

      <section class="card" aria-live="polite">
        <div class="step-header">
          <span id="stepLabel">Étape 1 / 3</span>
          <span id="statusBadge" class="badge">En cours</span>
        </div>

        <h2>Code Morse à décoder</h2>
        <p id="codeText" class="code-text"></p>

        <form id="textForm" class="form">
          <label for="textInput">Texte décodé</label>
          <input
            id="textInput"
            name="text"
            type="text"
            placeholder="Ex: HELLO WORLD"
          />
          <button type="submit">Vérifier</button>
        </form>

        <div class="result-zone">
          <p><strong>Résultat :</strong> <span id="resultText">—</span></p>
          <p><strong>Statut :</strong> <span id="resultStatus">—</span></p>
          <p id="hintText" class="hint"></p>
        </div>
      </section>
    </main>

    <script src="/public/js/scoreboard.js"></script>
    <script src="./morse.js"></script>
  </body>
</html>
