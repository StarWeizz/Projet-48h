<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercice Cesar - Decryptage</title>
    <link rel="stylesheet" href="./cesar.css" />
    <link rel="stylesheet" href="/css/global.css" />
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
  </head>
  <body>
    <nav class="navbar">
      <div class="navbar-left">
          <a href="/" class="project-title">Challenge 48h</a>
      </div>
      <div class="navbar-right">
          <a href="/" class="nav-link">Thèmes</a>
          <a href="/themes/decryptage" class="nav-link">Décryptage</a>
      </div>
    </nav>
    <main class="container">
      <h1>Exercice de Decryptage Cesar</h1>
      <p class="subtitle">
        Trouve le bon decalage pour chaque etape afin de decoder les messages.
      </p>

      <section class="card" aria-live="polite">
        <div class="step-header">
          <span id="stepLabel">Etape 1 / 3</span>
          <span id="statusBadge" class="badge">En cours</span>
        </div>

        <h2>Code a decoder</h2>
        <p id="codeText" class="code-text"></p>

        <form id="decalageForm" class="form">
          <label for="decalageInput">Decalage</label>
          <input
            id="decalageInput"
            name="decalage"
            type="number"
            min="0"
            max="25"
            placeholder="Ex: 7"
            required
          />
          <button type="submit">Decoder</button>
        </form>

        <div class="result-zone">
          <p><strong>Resultat :</strong> <span id="resultText">-</span></p>
          <p><strong>Statut :</strong> <span id="resultStatus">-</span></p>
          <p id="hintText" class="hint"></p>
        </div>
      </section>
    </main>

    <script src="./cesar.js"></script>
  </body>
</html>
