<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Défi Chimique - Décryptage</title>
    <link rel="stylesheet" href="./chimie.css" />
  </head>
  <body>
    <main class="container">
      <h1>Défi Chimique</h1>
      <p class="subtitle">
        Assemble les formules chimiques dans le bon ordre pour retrouver le mot caché.
        Clique sur les cartes dans l'ordre correct !
      </p>

      <section class="card" aria-live="polite">
        <div class="step-header">
          <span id="stepLabel">Étape 1 / 3</span>
          <span id="statusBadge" class="badge">En cours</span>
        </div>

        <p id="hintText" class="hint-text"></p>

        <div id="cardsGrid" class="cards-grid"></div>

        <div class="assembly-zone">
          <p class="assembly-label">Mot assemblé :</p>
          <div id="assembledWord" class="assembled-word">—</div>
        </div>

        <div class="actions">
          <button id="resetBtn" class="btn-reset">Réinitialiser</button>
          <button id="validateBtn" class="btn-validate" disabled>Vérifier</button>
        </div>

        <div class="result-zone" id="resultZone" style="display: none">
          <p><strong>Statut :</strong> <span id="resultStatus">—</span></p>
          <p id="resultHint" class="hint"></p>
        </div>
      </section>
    </main>

    <script src="./chimie.js"></script>
  </body>
</html>
