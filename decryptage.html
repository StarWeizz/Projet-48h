<!DOCTYPE HTML>
<html>
	<head>
		<title>Decryptage - Quiz 48h</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="assets/css/main.css" />
		<noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
	</head>
	<body class="is-preload">

		<!-- Wrapper -->
		<div id="wrapper">

			<!-- Header -->
			<header id="header">
				<a href="index.html" class="logo">Page d'accueil</a>
			</header>

			<!--Nav-->
			<nav id="nav">
				<ul class="links">
					<li><a href="index.html">menu principal</a></li>
					<li><a href="logic.html"> logic </a> </li>
					<li><a href="memoire.html">memoire</a></li>
					<li class="active"><a href="decryptage.html">decryptage</a></li>
				</ul>
			</nav>

			<!-- Main -->
			<div id="main">

				<!-- Posts -->
				<section class="posts">

					<article class="defi"
							 data-title="Quid dicis?"
							 data-text="Déchiffre ce message en latin : veni vidi vici"
							 data-link="jeu_decryptage1.html">
						<header>
							<h2>Quid dicis?</h2>
						</header>
						<a href="#" class="image fit"><img src="images/cesar.jpg" alt="" /></a>
						<p>veni vidi vici</p>
					</article>

					<article class="defi"
							 data-title="Le mugissement secret !"
							 data-text="Découvre le message caché en morse."
							 data-link="jeu_decryptage2.html">
						<header>
							<h2>Le mugissement secret !</h2>
						</header>
						<a href="#" class="image fit"><img src="images/morse.jpg" alt="" /></a>
						<p>Un son peut cacher un message...</p>
					</article>

					<article class="defi"
							 data-title="Esprit scientifique !"
							 data-text="Analyse la molécule et trouve le code caché."
							 data-link="jeu_decryptage3.html">
						<header>
							<h2>Esprit scientifique !</h2>
						</header>
						<a href="#" class="image fit"><img src="images/molecule.jpg" alt="" /></a>
						<p>La science renferme encore des secrets...</p>
					</article>

				</section>

			</div>

			<div id="modal" class="modal">
				<div class="modal-content">
					<span class="close">&times;</span>
					<h2 id="modal-title">Titre</h2>
					<p id="modal-text">Contenu du défi</p>
					<button id="start-btn">Lancer le défi</button>
				</div>
			</div>

		</div>

		<!-- Scripts -->
		<script src="assets/js/jquery.min.js"></script>
		<script src="assets/js/jquery.scrollex.min.js"></script>
		<script src="assets/js/jquery.scrolly.min.js"></script>
		<script src="assets/js/browser.min.js"></script>
		<script src="assets/js/breakpoints.min.js"></script>
		<script src="assets/js/util.js"></script>
		<script src="assets/js/main.js"></script>
		<script>
			const modal = document.getElementById("modal");
			const modalTitle = document.getElementById("modal-title");
			const modalText = document.getElementById("modal-text");
			const closeBtn = document.querySelector(".close");
			const startBtn = document.getElementById("start-btn");

			let currentLink = "#";

			document.querySelectorAll(".defi").forEach(defi => {
			defi.addEventListener("click", () => {
			modalTitle.textContent = defi.dataset.title;
			modalText.textContent = defi.dataset.text;
			currentLink = defi.dataset.link;

			modal.style.display = "block";
			});
			});

			startBtn.onclick = () => {
			window.location.href = currentLink;
			};

			closeBtn.onclick = () => {
			modal.style.display = "none";
			};

			window.onclick = (e) => {
			if (e.target === modal) {
			modal.style.display = "none";
			}
			};
		</script>

	</body>
</html>
